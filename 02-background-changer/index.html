<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Background Color Changer</h1>
    <div class="container">
        <button class="button" id="orange" onclick="changeColor('orange')">Orange</button>
        <button class="button" id="red" onclick="changeColor('red')">Red</button>
        <button class="button" id="blue" onclick="changeColor('blue')">Blue</button>
        <button class="button" id="black" onclick="changeColor('black')">Black</button>
        <button class="button" id="yellow" onclick="changeColor('yellow')">yellow</button>
    </div>

    <div class="box"></div>
    <div class="indicator">
        <div id="show-color"></div>
        <p>White</p>
    </div>

    <script src="./script.js"></script>
</body>

</html>
